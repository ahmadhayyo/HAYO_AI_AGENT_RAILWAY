[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "sh -c 'pnpm --filter @workspace/db run push-force && echo \"[DB] Migrations OK\" || echo \"[DB] Migration warning - server starting anyway\"; exec node --enable-source-maps artifacts/api-server/dist/index.mjs'"
healthcheckPath = "/api/healthz"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
