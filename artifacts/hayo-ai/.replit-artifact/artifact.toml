kind = "web"
previewPath = "/"
title = "HAYO AI"
version = "1.0.0"
id = "artifacts/hayo-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23836

[services.development]
run = "pnpm --filter @workspace/hayo-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hayo-ai", "run", "build" ]
publicDir = "artifacts/hayo-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23836"
BASE_PATH = "/"
