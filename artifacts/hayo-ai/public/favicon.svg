<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="HAYO AI">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="0.55" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#c026d3"/>
    </linearGradient>
    <linearGradient id="mark" x1="0.1" y1="1" x2="0.9" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e6e2ff"/>
    </linearGradient>
    <radialGradient id="spark" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#a5f3fc"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </radialGradient>
  </defs>

  <!-- Rounded app tile -->
  <rect x="3" y="3" width="94" height="94" rx="26" fill="url(#bg)"/>
  <rect x="3" y="3" width="94" height="94" rx="26" fill="none" stroke="#ffffff" stroke-opacity="0.14" stroke-width="1.5"/>

  <!-- H monogram: two pillars + a rising crossbar (growth) -->
  <g fill="url(#mark)">
    <rect x="27" y="26" width="12.5" height="48" rx="5"/>
    <rect x="60.5" y="26" width="12.5" height="48" rx="5"/>
    <rect x="33" y="44.5" width="34" height="11" rx="5" transform="rotate(-13 50 50)"/>
  </g>

  <!-- AI spark node -->
  <circle cx="73" cy="27" r="10" fill="url(#bg)"/>
  <circle cx="73" cy="27" r="6.5" fill="url(#spark)"/>
  <circle cx="73" cy="27" r="6.5" fill="none" stroke="#ffffff" stroke-opacity="0.7" stroke-width="1"/>
</svg>
